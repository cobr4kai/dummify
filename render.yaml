services:
  - type: web
    name: paperbrief-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    disk:
      name: paperbrief-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/paperbrief.db
      - key: PAPERBRIEF_CACHE_DIR
        value: /var/data/paperbrief-cache
      - key: ENABLE_LOCAL_CRON
        value: "false"
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_EXTRACTION_MODEL
        value: gpt-5-mini
      - key: OPENAI_SYNTHESIS_MODEL
        value: gpt-5.5
      - key: OPENAI_ENABLE_PREMIUM_SYNTHESIS
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENALEX_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        generateValue: true
